name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  build-assets:
    name: Build ${{ matrix.target }}
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    needs: release-please
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x64
            compile_target: bun-linux-x64
            binary_name: proxyobserver
            archive_name: proxyobserver-linux-x64.tar.gz
          - os: ubuntu-24.04
            target: linux-arm64
            compile_target: bun-linux-arm64
            binary_name: proxyobserver
            archive_name: proxyobserver-linux-arm64.tar.gz
          - os: macos-15-intel
            target: macos-x64
            compile_target: bun-darwin-x64
            binary_name: proxyobserver
            archive_name: proxyobserver-macos-x64.tar.gz
          - os: macos-14
            target: macos-arm64
            compile_target: bun-darwin-arm64
            binary_name: proxyobserver
            archive_name: proxyobserver-macos-arm64.tar.gz
          - os: macos-14
            target: macos-universal
            binary_name: proxyobserver
            archive_name: proxyobserver-macos-universal.tar.gz
          - os: windows-2022
            target: windows-x64
            compile_target: bun-windows-x64
            binary_name: proxyobserver.exe
            archive_name: proxyobserver-windows-x64.zip
          - os: windows-2022
            target: windows-arm64
            compile_target: bun-windows-arm64
            binary_name: proxyobserver.exe
            archive_name: proxyobserver-windows-arm64.zip

    env:
      BUN_VERSION: 1.3.11

    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile standalone binary on Unix
        if: runner.os != 'Windows' && matrix.target != 'macos-universal'
        run: |
          set +e
          for attempt in 1 2 3; do
            bun build --compile --target=${{ matrix.compile_target }} ./src/index.ts --outfile dist/${{ matrix.binary_name }}
            status=$?
            if [ "$status" -eq 0 ]; then
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "Compile failed (attempt $attempt/3), retrying in 5 seconds..."
              sleep 5
            fi
          done

          exit "$status"

      - name: Compile standalone binary on Windows
        if: runner.os == 'Windows' && matrix.target != 'macos-universal'
        shell: pwsh
        run: |
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            bun build --compile --target=${{ matrix.compile_target }} ./src/index.ts --outfile dist/${{ matrix.binary_name }}
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }

            if ($attempt -lt $maxAttempts) {
              Write-Host "Compile failed (attempt $attempt/$maxAttempts), retrying in 5 seconds..."
              Start-Sleep -Seconds 5
            }
          }

          exit $LASTEXITCODE

      - name: Compile universal macOS binary
        if: matrix.target == 'macos-universal'
        run: |
          bun build --compile --target=bun-darwin-x64 ./src/index.ts --outfile dist/proxyobserver-x64
          bun build --compile --target=bun-darwin-arm64 ./src/index.ts --outfile dist/proxyobserver-arm64
          lipo -create -output dist/${{ matrix.binary_name }} dist/proxyobserver-x64 dist/proxyobserver-arm64
          rm dist/proxyobserver-x64 dist/proxyobserver-arm64

      - name: Archive binary on Unix
        if: runner.os != 'Windows'
        run: tar -czf dist/${{ matrix.archive_name }} -C dist ${{ matrix.binary_name }}

      - name: Archive binary on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist/${{ matrix.binary_name }}" -DestinationPath "dist/${{ matrix.archive_name }}"

      - name: Create checksum on Unix
        if: runner.os != 'Windows'
        run: shasum -a 256 dist/${{ matrix.archive_name }} > dist/${{ matrix.archive_name }}.sha256

      - name: Create checksum on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "dist/${{ matrix.archive_name }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.archive_name }}" | Out-File -FilePath "dist/${{ matrix.archive_name }}.sha256" -Encoding ascii

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: dist/${{ matrix.archive_name }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/${{ matrix.archive_name }}
            dist/${{ matrix.archive_name }}.sha256

  publish-assets:
    name: Publish release assets
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    needs:
      - release-please
      - build-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create combined checksums file
        run: |
          cd release-assets
          cat *.sha256 > checksums.txt

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: gh release upload "$TAG_NAME" release-assets/* --clobber --repo "$REPOSITORY"
