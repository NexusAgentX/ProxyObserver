name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing release tag to rebuild and upload assets for
        required: false
        type: string

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  resolve-release-context:
    name: Resolve release context
    if: ${{ always() }}
    needs: release-please
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.resolve.outputs.should_publish }}
      tag_name: ${{ steps.resolve.outputs.tag_name }}

    steps:
      - name: Resolve tag
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_TAG_NAME: ${{ inputs.tag_name }}
          RELEASE_CREATED: ${{ needs.release-please.outputs.release_created }}
          RELEASE_TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          should_publish=false
          tag_name=

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$MANUAL_TAG_NAME" ]; then
            should_publish=true
            tag_name="$MANUAL_TAG_NAME"
          elif [ "$RELEASE_CREATED" = "true" ] && [ -n "$RELEASE_TAG_NAME" ]; then
            should_publish=true
            tag_name="$RELEASE_TAG_NAME"
          fi

          echo "should_publish=$should_publish" >> "$GITHUB_OUTPUT"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"

  build-assets:
    name: Build ${{ matrix.target }}
    if: ${{ needs.resolve-release-context.outputs.should_publish == 'true' }}
    needs: resolve-release-context
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x64
            binary_name: proxyobserver
            archive_name: proxyobserver-linux-x64.tar.gz
          - os: macos-15-intel
            target: macos-x64
            binary_name: proxyobserver
            archive_name: proxyobserver-macos-x64.tar.gz
          - os: macos-14
            target: macos-arm64
            binary_name: proxyobserver
            archive_name: proxyobserver-macos-arm64.tar.gz
          - os: windows-2022
            target: windows-x64
            binary_name: proxyobserver.exe
            archive_name: proxyobserver-windows-x64.zip

    env:
      BUN_VERSION: 1.3.11

    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release-context.outputs.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile standalone binary
        run: bun build --compile ./src/index.ts --outfile dist/${{ matrix.binary_name }}

      - name: Archive binary on Unix
        if: runner.os != 'Windows'
        run: tar -czf dist/${{ matrix.archive_name }} -C dist ${{ matrix.binary_name }}

      - name: Archive binary on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist/${{ matrix.binary_name }}" -DestinationPath "dist/${{ matrix.archive_name }}"

      - name: Create checksum on Unix
        if: runner.os != 'Windows'
        run: shasum -a 256 dist/${{ matrix.archive_name }} > dist/${{ matrix.archive_name }}.sha256

      - name: Create checksum on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "dist/${{ matrix.archive_name }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.archive_name }}" | Out-File -FilePath "dist/${{ matrix.archive_name }}.sha256" -Encoding ascii

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: dist/${{ matrix.archive_name }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/${{ matrix.archive_name }}
            dist/${{ matrix.archive_name }}.sha256

  publish-assets:
    name: Publish release assets
    if: ${{ needs.resolve-release-context.outputs.should_publish == 'true' }}
    needs:
      - resolve-release-context
      - build-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create combined checksums file
        run: |
          cd release-assets
          cat *.sha256 > checksums.txt

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.resolve-release-context.outputs.tag_name }}
        run: gh release upload "$TAG_NAME" release-assets/* --clobber
