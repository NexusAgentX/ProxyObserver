name: Rebuild Release Assets

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing release tag to rebuild and upload assets for
        required: true
        type: string

permissions:
  contents: write

env:
  BUN_VERSION: 1.3.11

jobs:
  build-linux-assets:
    name: Build Linux and Windows assets
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      attestations: write
      id-token: write

    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Linux and Windows release assets
        run: |
          set -euo pipefail
          mkdir -p dist

          compile_with_retry() {
            local compile_target="$1"
            local output_path="$2"
            local status=0

            for attempt in 1 2 3; do
              if bun build --compile --target="$compile_target" ./src/index.ts --outfile "$output_path"; then
                return 0
              else
                status=$?
              fi

              if [ "$attempt" -lt 3 ]; then
                echo "Compile failed for $compile_target (attempt $attempt/3), retrying in 5 seconds..."
                sleep 5
              fi
            done

            return "$status"
          }

          package_archive() {
            local input_path="$1"
            local output_name="$2"
            local archive_name="$3"
            local archive_path="$PWD/dist/$archive_name"
            local stage_dir

            stage_dir="$(mktemp -d)"
            cp "$input_path" "$stage_dir/$output_name"

            if [[ "$archive_name" == *.zip ]]; then
              (cd "$stage_dir" && zip -q "$archive_path" "$output_name")
            else
              tar -czf "$archive_path" -C "$stage_dir" "$output_name"
            fi

            shasum -a 256 "$archive_path" > "$archive_path.sha256"
            rm -rf "$stage_dir"
            rm -f "$input_path"
          }

          compile_with_retry bun-linux-x64 dist/proxyobserver-linux-x64
          package_archive dist/proxyobserver-linux-x64 proxyobserver proxyobserver-linux-x64.tar.gz

          compile_with_retry bun-linux-arm64 dist/proxyobserver-linux-arm64
          package_archive dist/proxyobserver-linux-arm64 proxyobserver proxyobserver-linux-arm64.tar.gz

          compile_with_retry bun-windows-x64 dist/proxyobserver-windows-x64.exe
          package_archive dist/proxyobserver-windows-x64.exe proxyobserver.exe proxyobserver-windows-x64.zip

          compile_with_retry bun-windows-arm64 dist/proxyobserver-windows-arm64.exe
          package_archive dist/proxyobserver-windows-arm64.exe proxyobserver.exe proxyobserver-windows-arm64.zip

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: release-linux-and-windows
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256

  build-macos-assets:
    name: Build macOS assets
    runs-on: macos-14
    permissions:
      contents: read
      attestations: write
      id-token: write

    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build macOS release assets
        run: |
          set -euo pipefail
          mkdir -p dist

          compile_with_retry() {
            local compile_target="$1"
            local output_path="$2"
            local status=0

            for attempt in 1 2 3; do
              if bun build --compile --target="$compile_target" ./src/index.ts --outfile "$output_path"; then
                return 0
              else
                status=$?
              fi

              if [ "$attempt" -lt 3 ]; then
                echo "Compile failed for $compile_target (attempt $attempt/3), retrying in 5 seconds..."
                sleep 5
              fi
            done

            return "$status"
          }

          package_archive() {
            local input_path="$1"
            local output_name="$2"
            local archive_name="$3"
            local archive_path="$PWD/dist/$archive_name"
            local stage_dir

            stage_dir="$(mktemp -d)"
            cp "$input_path" "$stage_dir/$output_name"
            tar -czf "$archive_path" -C "$stage_dir" "$output_name"
            shasum -a 256 "$archive_path" > "$archive_path.sha256"
            rm -rf "$stage_dir"
            rm -f "$input_path"
          }

          compile_with_retry bun-darwin-x64 dist/proxyobserver-macos-x64
          compile_with_retry bun-darwin-arm64 dist/proxyobserver-macos-arm64
          lipo -create -output dist/proxyobserver-macos-universal dist/proxyobserver-macos-x64 dist/proxyobserver-macos-arm64

          package_archive dist/proxyobserver-macos-x64 proxyobserver proxyobserver-macos-x64.tar.gz
          package_archive dist/proxyobserver-macos-arm64 proxyobserver proxyobserver-macos-arm64.tar.gz
          package_archive dist/proxyobserver-macos-universal proxyobserver proxyobserver-macos-universal.tar.gz

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: dist/*.tar.gz

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: release-macos
          path: |
            dist/*.tar.gz
            dist/*.sha256

  publish-assets:
    name: Publish release assets
    needs:
      - build-linux-assets
      - build-macos-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: release-assets
          merge-multiple: true

      - name: Create combined checksums file
        run: |
          cd release-assets
          cat *.sha256 > checksums.txt

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: gh release upload "$TAG_NAME" release-assets/* --clobber --repo "$REPOSITORY"
