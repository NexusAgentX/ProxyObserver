name: Rebuild Release Assets

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing release tag to rebuild and upload assets for
        required: true
        type: string

permissions:
  contents: write

env:
  BUN_VERSION: 1.3.11

jobs:
  build-assets:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x64
            binary_name: proxyobserver
            archive_name: proxyobserver-linux-x64.tar.gz
          - os: macos-15-intel
            target: macos-x64
            binary_name: proxyobserver
            archive_name: proxyobserver-macos-x64.tar.gz
          - os: macos-14
            target: macos-arm64
            binary_name: proxyobserver
            archive_name: proxyobserver-macos-arm64.tar.gz
          - os: windows-2022
            target: windows-x64
            binary_name: proxyobserver.exe
            archive_name: proxyobserver-windows-x64.zip

    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile standalone binary
        run: bun build --compile ./src/index.ts --outfile dist/${{ matrix.binary_name }}

      - name: Archive binary on Unix
        if: runner.os != 'Windows'
        run: tar -czf dist/${{ matrix.archive_name }} -C dist ${{ matrix.binary_name }}

      - name: Archive binary on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist/${{ matrix.binary_name }}" -DestinationPath "dist/${{ matrix.archive_name }}"

      - name: Create checksum on Unix
        if: runner.os != 'Windows'
        run: shasum -a 256 dist/${{ matrix.archive_name }} > dist/${{ matrix.archive_name }}.sha256

      - name: Create checksum on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "dist/${{ matrix.archive_name }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.archive_name }}" | Out-File -FilePath "dist/${{ matrix.archive_name }}.sha256" -Encoding ascii

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: dist/${{ matrix.archive_name }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/${{ matrix.archive_name }}
            dist/${{ matrix.archive_name }}.sha256

  publish-assets:
    name: Publish release assets
    needs: build-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create combined checksums file
        run: |
          cd release-assets
          cat *.sha256 > checksums.txt

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: gh release upload "$TAG_NAME" release-assets/* --clobber --repo "$REPOSITORY"
